<header class="header">
  <div class="header-container">
    
    <a routerLink="/" class="logo" (click)="closeMobileMenu()">
      <div class="logo-icon">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="4" r="2"></circle>
          <circle cx="18" cy="8" r="2"></circle>
          <circle cx="20" cy="16" r="2"></circle>
          <path d="M9 10a5 5 0 0 1 5 5v3.5a3.5 3.5 0 0 1-6.84 1.045Q6.52 17.48 4.46 16.84A3.5 3.5 0 0 1 5.5 10Z"></path>
        </svg>
      </div>
      <span class="logo-text">PawsStore</span>
    </a>

    <!-- Навигация (десктоп) -->
    <nav class="nav-desktop">
      @for (link of navLinks; track link.label) {
        <a 
          [routerLink]="link.path" 
          routerLinkActive="active"
          class="nav-link"
          (click)="closeMobileMenu()"
        >
          {{ link.label }}
        </a>
      }
    </nav>

    <!-- Правая часть: действия -->
    <div class="header-actions">
      
      <!-- Поиск -->
      <button class="action-btn" aria-label="Поиск">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="8"></circle>
          <path d="m21 21-4.3-4.3"></path>
        </svg>
      </button>

      <!-- Корзина -->
      <a routerLink="/cart" class="action-btn cart-btn" aria-label="Корзина" (click)="closeMobileMenu()">
        <div class="cart-icon-wrapper">
          <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="8" cy="21" r="1"></circle>
            <circle cx="19" cy="21" r="1"></circle>
            <path d="M2.05 2.05h2l2.66 12.42a2 2 0 0 0 2 1.58h9.78a2 2 0 0 0 1.95-1.57l1.65-7.43H5.12"></path>
          </svg>
          @if (cartService.itemCount() > 0) {
            <span class="cart-badge">{{ cartService.itemCount() }}</span>
          }
        </div>
      </a>

      <!-- Кнопка бутерброда для адаптивности -->
      <button 
        class="action-btn mobile-menu-btn" 
        (click)="toggleMobileMenu()"
        aria-label="Меню"
        [attr.aria-expanded]="isMobileMenuOpen()"
      >
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="4" x2="20" y1="12" y2="12"></line>
          <line x1="4" x2="20" y1="6" y2="6"></line>
          <line x1="4" x2="20" y1="18" y2="18"></line>
        </svg>
      </button>
    </div>

    <!-- Бутерброд -->
    @if (isMobileMenuOpen()) {
      <nav class="nav-mobile">
        @for (link of navLinks; track link.label) {
          <a 
            [routerLink]="link.path" 
            routerLinkActive="active"
            class="nav-link-mobile"
            (click)="closeMobileMenu()"
          >
            {{ link.label }}
          </a>
        }
      </nav>
    }
  </div>
</header>
